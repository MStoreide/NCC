name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Package addon
        run: |
          mkdir -p NCC
          cp -r NCC.toc NCC.lua NCC_Fun.lua media/ NCC/
          zip -r "NCC-${{ steps.version.outputs.version }}.zip" NCC/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: NCC-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
